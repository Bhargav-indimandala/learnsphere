{% extends "base.html" %}
{% block title %}Change Password — LearnSphere{% endblock %}
{% block content %}
<div style="max-width:420px;margin:3rem auto;padding:0 1.5rem;">
  <a href="{{ url_for('main.profile') }}" class="btn btn-ghost btn-sm mb-3">← Back to profile</a>
  <h1 class="font-syne fw-700" style="font-size:1.5rem;letter-spacing:-.03em;margin-bottom:1.5rem;">Change password</h1>
  <div class="card card-body">
    <form method="POST" action="{{ url_for('auth.change_password') }}">
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label">Current password</label>
        <input type="password" name="current_password" class="form-control" required autocomplete="current-password">
      </div>
      <div class="form-group">
        <label class="form-label">New password</label>
        <input type="password" name="new_password" class="form-control" required autocomplete="new-password" minlength="8">
        <div class="form-hint">Minimum 8 characters</div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm new password</label>
        <input type="password" name="confirm_password" class="form-control" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Update password</button>
    </form>
  </div>
</div>
{% endblock %}
