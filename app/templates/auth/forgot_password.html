{% extends "base.html" %}
{% block title %}Forgot Password — LearnSphere{% endblock %}
{% block content %}
<div style="display:flex;min-height:calc(100vh - 57px);align-items:center;justify-content:center;padding:2rem 1.5rem;">
  <div style="width:100%;max-width:400px;">
    <div style="font-size:2.5rem;margin-bottom:1rem;">🔑</div>
    <h1 class="font-syne fw-700" style="font-size:1.5rem;letter-spacing:-.03em;margin-bottom:.3rem;">Forgot your password?</h1>
    <p class="text-muted" style="font-size:.875rem;margin-bottom:1.75rem;line-height:1.55;">
      Enter your account email and we'll send a 6-digit reset code to your terminal.
    </p>
    <div class="card card-body">
      <form method="POST" action="{{ url_for('auth.forgot_password') }}">
        <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com"
                 required autocomplete="email" autofocus>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Send reset code</button>
      </form>
    </div>
    <div style="text-align:center;margin-top:1.25rem;font-size:.82rem;color:var(--muted);">
      Remember it? <a href="{{ url_for('auth.login') }}" style="color:var(--ink);font-weight:600;text-decoration:none;">Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
