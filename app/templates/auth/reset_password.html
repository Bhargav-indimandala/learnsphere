{% extends "base.html" %}
{% block title %}Reset Password — LearnSphere{% endblock %}
{% block content %}
<div style="display:flex;min-height:calc(100vh - 57px);align-items:center;justify-content:center;padding:2rem 1.5rem;">
  <div style="width:100%;max-width:400px;">
    <div style="font-size:2.5rem;margin-bottom:1rem;">🔒</div>
    <h1 class="font-syne fw-700" style="font-size:1.5rem;letter-spacing:-.03em;margin-bottom:.3rem;">Set new password</h1>
    <p class="text-muted" style="font-size:.875rem;margin-bottom:1.75rem;">Identity verified. Choose a strong new password.</p>
    <div class="card card-body">
      <form method="POST" action="{{ url_for('auth.reset_password') }}">
        <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
        <div class="form-group">
          <label class="form-label">New password</label>
          <input type="password" name="new_password" class="form-control"
                 placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm new password</label>
          <input type="password" name="confirm_password" class="form-control"
                 placeholder="Repeat password" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Reset password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
