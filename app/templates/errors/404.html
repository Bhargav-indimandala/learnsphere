{% extends "base.html" %}
{% block title %}Page not found — LearnSphere{% endblock %}
{% block content %}
<style>
.error-page { max-width:560px; margin:5rem auto; padding:0 1.5rem; text-align:center; }
.error-code { font-family:'Syne',sans-serif; font-size:6rem; font-weight:800; letter-spacing:-.05em; color:var(--bg3); line-height:1; }
.error-title { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:700; margin:.5rem 0; }
.error-desc { color:var(--muted); font-size:.925rem; line-height:1.65; margin-bottom:1.75rem; }
</style>
<div class="error-page">
  <div class="error-code">404</div>
  <div class="error-title">Page not found</div>
  <p class="error-desc">The page you're looking for doesn't exist, has been moved, or the URL was typed incorrectly.</p>
  <div class="flex gap-2" style="justify-content:center;flex-wrap:wrap;">
    <a href="{{ url_for('main.home') }}" class="btn btn-primary">Go home</a>
    <a href="{{ url_for('courses.course_list') }}" class="btn btn-secondary">Browse courses</a>
  </div>
</div>
{% endblock %}
